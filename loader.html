<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading | Bhat Writes</title>
       <link rel="icon" type="image/png" sizes="32x32" href="images/faviconlogo.png">
     
    <style>
        .loader{
            width:50px;
            height:50px;
            border-radius: 50%;
       
            border:5px green solid;
                 border-top:5px black solid;
                 animation: loaderanimate infinite 1s ease-in-out 3s ;
        }
        @keyframes loaderanimate{
            from{
                transform:rotate(0deg)
            }
            to{
                transform:rotate(360deg)
            }
        }
    </style>
</head>
<body>
    
    <div class="loader">

    </div>
</body>
</html>
